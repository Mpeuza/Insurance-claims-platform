resources:
  jobs:
    insurance_claims_ingest_job:
      name: "insurance_claims_ingest_job"
      tasks:
        - task_key: ingest_claims
          notebook_task:
            notebook_path: ../../notebooks/ingest/ingest_claims.py
            base_parameters:
              target_catalog: "${var.catalog}"
              source_name: "claims"

        - task_key: ingest_policies
          notebook_task:
            notebook_path: ../../notebooks/ingest/ingest_policies.py
            base_parameters:
              target_catalog: "${var.catalog}"
              source_name: "policies"

        - task_key: transform_bronze_to_silver
          depends_on:
            - task_key: ingest_claims
            - task_key: ingest_policies
          notebook_task:
            notebook_path: ../../notebooks/transform/transform_bronze_to_silver.py
            base_parameters:
              target_catalog: "${var.catalog}"

        - task_key: transform_silver_to_gold
          depends_on:
            - task_key: transform_bronze_to_silver
          notebook_task:
            notebook_path: ../../notebooks/transform/transform_silver_to_gold.py
            base_parameters:
              target_catalog: "${var.catalog}"